<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="heading">
        <h1 id="title">Rock Paper Scissor</h1>
    </div>

    <div class="gamearea">
        <div class="move" id="rock"><i class="fa-regular fa-hand-back-fist icon"></i></div>
        <div class="move" id="paper"><i class="fa-regular fa-hand icon"></i></div>
        <div class="move" id="scissor"><i class="fa-regular fa-hand-scissors icon"></i></div>
    </div>

    <div class="scoreboard">
        <div class="score myscore">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class=" score compscore">
            <p id="comp-score">0</p>
            <p>Comp</p>
        </div>
    </div>

    <div class="msgcontainer">
        <p id="msg">Play your Move</p>
    </div>
    <script src="script.js" ></script>
</body>
</html>
